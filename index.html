<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>原神キャラルーレット</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#1d2535">

</head>


<body>


<div id="app">


<header>

<h1>🎲 原神キャラルーレット</h1>

<p>Ver.1.1</p>

</header>



<main>



<!-- キャラ表示 -->

<div id="characterCard">


<img 
id="characterImage"
src=""
alt="">



<h2 id="characterName">

ボタンを押して抽選！

</h2>



<p id="characterInfo"></p>


</div>





<!-- メニュー -->

<div class="menu">


<button id="spinButton">
🎲 1人抽選
</button>


<button id="partyButton">
👥 4人パーティ
</button>


<button id="abyssButton">
🌀 螺旋8人
</button>


<button id="characterListButton">
📖 キャラ一覧
</button>


<button id="historyButton">
📜 履歴
</button>


<button id="settingButton">
⚙️ 設定
</button>



</div>






<!-- キャラ一覧 -->

<section id="characterArea">


<h2>
📖 キャラ一覧
</h2>



<input
id="searchBox"
placeholder="キャラ名検索">



<div class="filterButtons">


<button id="allFilter">
全部
</button>


<button id="fiveFilter">
★5
</button>


<button id="fourFilter">
★4
</button>



</div>



<div id="characterList"></div>


</section>







<!-- パーティ -->

<section id="partyArea">


<h2>
👥 パーティ
</h2>


<div id="partyList"></div>


</section>







<!-- 螺旋 -->

<section id="abyssArea">


<h2>
🌀 螺旋8人
</h2>


<div id="abyssList"></div>


</section>








<!-- 履歴 -->

<section id="historyArea">


<h2>
📜 履歴
</h2>


<div id="history"></div>


</section>








<!-- 設定 -->

<section id="settingArea">


<h2>
⚙️ 設定
</h2>


<p>
設定機能準備中
</p>


</section>





</main>


</div>





<script src="script.js"></script>


</body>


</html>
